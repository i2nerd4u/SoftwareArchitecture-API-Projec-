name: Build and deploy ASP.Net Core app to Azure Web App - gamereviews-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Build with dotnet
        run: dotnet build "Software architecture api.csproj" --configuration Release

      - name: Run Tests
        run: dotnet test "Architect.Tests/Architect.Tests.csproj" --configuration Release --verbosity normal

      - name: dotnet publish
        run: dotnet publish "Software architecture api.csproj" -c Release -o "${{env.DOTNET_ROOT}}/myapp"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B969EACD335B430AABC1F36A43890137 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_014BFDD2FA544288AC96647032CAEA4A }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_7DB753F65AD84776989B59A244369609 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'gamereviews-api'
          slot-name: 'Production'
          package: .
