<!DOCTYPE html>
<html>
<head>
    <title>Fun Facts Database</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Arial', sans-serif;
            background: #000000;
            min-height: 100vh;
            color: white;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 1s ease-out;
        }
        
        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .lang-toggle {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .lang-btn {
            padding: 10px 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 25px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .lang-btn.active {
            background: rgba(255,255,255,0.3);
            border-color: #4ecdc4;
        }
        
        .lang-btn:hover {
            transform: translateY(-2px);
        }
        
        .form-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            animation: fadeInUp 1s ease-out 0.3s both;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 1.1em;
        }
        
        input, textarea {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            background: rgba(255,255,255,0.9);
            color: #333;
            transition: all 0.3s ease;
        }
        
        input:focus, textarea:focus {
            outline: none;
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(255,255,255,0.3);
        }
        
        .submit-btn {
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 10px;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        
        .people-section {
            animation: fadeInUp 1s ease-out 0.6s both;
        }
        
        .people-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .people-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .person-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        
        .person-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
        
        .person-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left 0.5s;
        }
        
        .person-card:hover::before {
            left: 100%;
        }
        
        .person-name {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 5px;
            color: #fff;
        }
        
        .person-author {
            font-size: 0.9em;
            opacity: 0.8;
            margin-bottom: 10px;
        }
        
        .person-fact {
            font-size: 1.1em;
            line-height: 1.4;
            margin-bottom: 15px;
            opacity: 0.9;
        }
        
        .person-date {
            font-size: 0.9em;
            opacity: 0.7;
            text-align: right;
        }
        
        .refresh-btn {
            background: linear-gradient(45deg, #4ecdc4, #44a08d);
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            display: block;
            margin: 0 auto;
        }
        
        .refresh-btn:hover {
            transform: scale(1.05);
        }
        
        .loading {
            text-align: center;
            font-size: 1.2em;
            opacity: 0.8;
        }
        
        .success-message {
            background: rgba(46, 204, 113, 0.2);
            border: 2px solid #2ecc71;
            color: #2ecc71;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
            font-weight: bold;
            animation: slideIn 0.5s ease-out;
        }
        
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
        
        @media (max-width: 768px) {
            .header h1 { font-size: 2em; }
            .container { padding: 15px; }
            .form-card { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 id="pageTitle">Video Game Reviews</h1>
            <p id="pageSubtitle">Tell others about your favourite video games!</p>
        </div>
        
        <!-- Language Toggle -->
        <div class="lang-toggle">
            <button onclick="setLang('en')" id="langEn" class="lang-btn active">English</button>
            <button onclick="setLang('ga')" id="langGa" class="lang-btn">Gaeilge</button>
        </div>
        
        <!-- Navigation Tabs -->
        <div style="display: flex; gap: 10px; justify-content: center; margin-bottom: 30px;">
            <button onclick="showSection('reviews')" id="reviewsTab" class="tab-btn active" style="background: rgba(255,255,255,0.3); padding: 15px 30px; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer;">Reviews</button>
            <button onclick="showSection('games')" id="gamesTab" class="tab-btn" style="background: rgba(255,255,255,0.1); padding: 15px 30px; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer;">Games Database</button>
        </div>
        
        <!-- Reviews Section -->
        <div id="reviewsSection">
        <div class="form-card">
            <h2 id="addReviewHeading" style="margin-bottom: 20px; text-align: center;">Add a Review</h2>
            <form id="personForm">
                <div class="form-group">
                    <label id="labelAuthor" for="firstName">Author Name:</label>
                    <input type="text" id="firstName" placeholder="Enter your name" required>
                </div>
                
                <div class="form-group">
                    <label id="labelGameTitle" for="gametitle">Game Title:</label>
                    <input type="text" id="gametitle" placeholder="Enter the game title" required>
                </div>

                <div class="form-group">
                    <label id="labelPlatformPlayed" for="platform">Platform Played On:</label>
                    <input type="text" id="platform" placeholder="e.g., PS5, Xbox, PC, Mobile" required>
                </div>
                
                <div class="form-group">
                    <label id="labelYourReview" for="funFact">Your Review:</label>
                    <textarea id="funFact" rows="3" placeholder="Tell us your thoughts on this game" required></textarea>
                </div>
                
                <button type="submit" class="submit-btn" id="addReviewBtn">Add a Review!</button>
            </form>
            <div id="successMessage"></div>
        </div>
        
        <div class="people-section">
            <div class="people-header">
                <h2 id="recentReviewsHeading">Recent Video Game Reviews</h2>
            </div>
            <div id="peopleGrid" class="people-grid"></div>
            <button onclick="loadPeople()" class="refresh-btn" id="refreshReviewsBtn">Refresh Reviews</button>
        </div>
        </div>
        
        <!-- Games Section -->
        <div id="gamesSection" style="display: none;">
        <div class="form-card">
            <h2 id="addGameHeading" style="margin-bottom: 20px;">Add New Game</h2>
            <form id="gameForm">
                <div class="form-group">
                    <label id="labelGameTitleGame" for="gameTitle">Game Title:</label>
                    <input type="text" id="gameTitle" placeholder="Enter game title" required>
                </div>
                <div class="form-group">
                    <label id="labelGenre" for="genre">Genre:</label>
                    <input type="text" id="genre" placeholder="e.g., Action, RPG, Puzzle" required>
                </div>
                <div class="form-group">
                    <label id="labelDeveloper" for="developer">Developer:</label>
                    <input type="text" id="developer" placeholder="Game developer" required>
                </div>
                <div class="form-group">
                    <label id="labelPlatform" for="gamePlatform">Platform:</label>
                    <input type="text" id="gamePlatform" placeholder="e.g., PS5, Xbox, PC" required>
                </div>
                <div class="form-group">
                    <label id="labelReleaseYear" for="releaseYear">Release Year:</label>
                    <input type="text" id="releaseYear" placeholder="2024" required>
                </div>
                <button type="submit" class="submit-btn" id="addGameBtn">Add Game</button>
            </form>
            <div id="gameSuccessMessage"></div>
        </div>
        
        <div class="people-section">
            <div class="people-header">
                <h2 id="gamesDatabaseHeading">Games Database</h2>
            </div>
            <div id="gamesGrid" class="people-grid"></div>
            <button onclick="loadGames()" class="refresh-btn" id="refreshGamesBtn">Refresh Games</button>
        </div>
        </div>
    </div>

    <script>
        // Translations
        const translations = {
            en: {
                title: "Video Game Reviews",
                subtitle: "Tell others about your favourite video games!",
                reviews: "Reviews",
                gamesDatabase: "Games Database",
                addReviewHeading: "Add a Review",
                authorName: "Author Name:",
                authorNamePlaceholder: "Enter your name",
                gameTitle: "Game Title:",
                gameTitlePlaceholder: "Enter the game title",
                platformPlayedOn: "Platform Played On:",
                platformPlayedOnPlaceholder: "e.g., PS5, Xbox, PC, Mobile",
                yourReview: "Your Review:",
                yourReviewPlaceholder: "Tell us your thoughts on this game",
                addReviewButton: "Add a Review!",
                recentReviews: "Recent Video Game Reviews",
                refreshData: "Refresh Reviews",
                noReviews: "Be the first to share a review!",
                playedOn: "Played on",
                notSpecified: "Not specified",
                addGameHeading: "Add New Game",
                genre: "Genre:",
                genrePlaceholder: "e.g., Action, RPG, Puzzle",
                developer: "Developer:",
                developerPlaceholder: "Game developer",
                platform: "Platform:",
                platformPlaceholder: "e.g., PS5, Xbox, PC",
                releaseYear: "Release Year:",
                releaseYearPlaceholder: "2024",
                addGameButton: "Add Game",
                gamesDatabaseHeading: "Games Database",
                refreshGames: "Refresh Games",
                noGames: "No games yet. Add the first one!",
                released: "Released"
            },
            ga: {
                title: "Léirmheasanna Cluichí Físe",
                subtitle: "Inis do dhaoine eile faoi na cluichí físe is fearr leat!",
                reviews: "Léirmheasanna",
                gamesDatabase: "Bunachar Sonraí na gCluichí",
                addReviewHeading: "Cuir Léirmheas Leis",
                authorName: "Ainm an Údair:",
                authorNamePlaceholder: "Cuir isteach d'ainm",
                gameTitle: "Teideal an Chluiche:",
                gameTitlePlaceholder: "Cuir isteach teideal an chluiche",
                platformPlayedOn: "Ardán a Imríodh Air:",
                platformPlayedOnPlaceholder: "m.sh. PS5, Xbox, PC, Mobile",
                yourReview: "Do Léirmheas:",
                yourReviewPlaceholder: "Inis dúinn do thuairim faoin gcluiche seo",
                addReviewButton: "Cuir Léirmheas Leis!",
                recentReviews: "Léirmheasanna Cluichí is Déanaí",
                refreshData: "Athnuaigh Sonraí",
                noReviews: "Bí ar an gcéad duine a roinnfidh léirmheas!",
                playedOn: "Imríodh ar",
                notSpecified: "Gan sonrú",
                addGameHeading: "Cuir Cluiche Nua Leis",
                genre: "Seánra:",
                genrePlaceholder: "m.sh. Aicsin, RPG, Puzal",
                developer: "Forbróir:",
                developerPlaceholder: "Forbróir an chluiche",
                platform: "Ardán:",
                platformPlaceholder: "m.sh. PS5, Xbox, PC",
                releaseYear: "Bliain Eisiúna:",
                releaseYearPlaceholder: "2024",
                addGameButton: "Cuir Cluiche Leis",
                gamesDatabaseHeading: "Bunachar Sonraí na gCluichí",
                refreshGames: "Athnuaigh Sonraí",
                noGames: "Níl aon chluichí ann fós. Cuir an chéad cheann leis!",
                released: "Eisithe"
            }
        };

        let currentLang = 'en';

        function setLang(lang) {
            currentLang = lang;
            const t = translations[lang];

            document.getElementById('langEn').classList.toggle('active', lang === 'en');
            document.getElementById('langGa').classList.toggle('active', lang === 'ga');

            document.getElementById('pageTitle').textContent = t.title;
            document.getElementById('pageSubtitle').textContent = t.subtitle;
            document.getElementById('reviewsTab').textContent = t.reviews;
            document.getElementById('gamesTab').textContent = t.gamesDatabase;
            document.getElementById('addReviewHeading').textContent = t.addReviewHeading;
            document.getElementById('labelAuthor').textContent = t.authorName;
            document.getElementById('firstName').placeholder = t.authorNamePlaceholder;
            document.getElementById('labelGameTitle').textContent = t.gameTitle;
            document.getElementById('gametitle').placeholder = t.gameTitlePlaceholder;
            document.getElementById('labelPlatformPlayed').textContent = t.platformPlayedOn;
            document.getElementById('platform').placeholder = t.platformPlayedOnPlaceholder;
            document.getElementById('labelYourReview').textContent = t.yourReview;
            document.getElementById('funFact').placeholder = t.yourReviewPlaceholder;
            document.getElementById('addReviewBtn').textContent = t.addReviewButton;
            document.getElementById('recentReviewsHeading').textContent = t.recentReviews;
            document.getElementById('refreshReviewsBtn').textContent = t.refreshData;
            document.getElementById('addGameHeading').textContent = t.addGameHeading;
            document.getElementById('labelGameTitleGame').textContent = t.gameTitle;
            document.getElementById('gameTitle').placeholder = t.gameTitlePlaceholder;
            document.getElementById('labelGenre').textContent = t.genre;
            document.getElementById('genre').placeholder = t.genrePlaceholder;
            document.getElementById('labelDeveloper').textContent = t.developer;
            document.getElementById('developer').placeholder = t.developerPlaceholder;
            document.getElementById('labelPlatform').textContent = t.platform;
            document.getElementById('gamePlatform').placeholder = t.platformPlaceholder;
            document.getElementById('labelReleaseYear').textContent = t.releaseYear;
            document.getElementById('releaseYear').placeholder = t.releaseYearPlaceholder;
            document.getElementById('addGameBtn').textContent = t.addGameButton;
            document.getElementById('gamesDatabaseHeading').textContent = t.gamesDatabaseHeading;
            document.getElementById('refreshGamesBtn').textContent = t.refreshGames;

            // Re-render cards with new language
            loadPeople();
            loadGames();
        }

        function showSection(section) {
            if (section === 'reviews') {
                document.getElementById('reviewsSection').style.display = 'block';
                document.getElementById('gamesSection').style.display = 'none';
                document.getElementById('reviewsTab').style.background = 'rgba(255,255,255,0.3)';
                document.getElementById('gamesTab').style.background = 'rgba(255,255,255,0.1)';
                loadPeople();
            } else {
                document.getElementById('reviewsSection').style.display = 'none';
                document.getElementById('gamesSection').style.display = 'block';
                document.getElementById('reviewsTab').style.background = 'rgba(255,255,255,0.1)';
                document.getElementById('gamesTab').style.background = 'rgba(255,255,255,0.3)';
                loadGames();
            }
        }
        
        document.getElementById('gameForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = e.target.querySelector('.submit-btn');
            submitBtn.textContent = 'Adding Game...';
            submitBtn.disabled = true;
            
            const game = {
                title: document.getElementById('gameTitle').value,
                genre: document.getElementById('genre').value,
                developer: document.getElementById('developer').value,
                platform: document.getElementById('gamePlatform').value,
                releaseYear: document.getElementById('releaseYear').value
            };
            
            try {
                const response = await fetch('/api/games', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(game)
                });
                
                if (response.ok) {
                    showGameSuccessMessage('Game added successfully!');
                    document.getElementById('gameForm').reset();
                    setTimeout(() => loadGames(), 1000);
                } else {
                    showGameSuccessMessage('Error adding game. Please try again.');
                }
            } catch (error) {
                showGameSuccessMessage('Error: ' + error.message);
            } finally {
                submitBtn.textContent = translations[currentLang].addGameButton;
                submitBtn.disabled = false;
            }
        });
        
        function showGameSuccessMessage(message) {
            const messageDiv = document.getElementById('gameSuccessMessage');
            messageDiv.innerHTML = `<div class="success-message">${message}</div>`;
            setTimeout(() => messageDiv.innerHTML = '', 4000);
        }
        
        async function loadGames() {
            const gridDiv = document.getElementById('gamesGrid');
            const t = translations[currentLang];
            gridDiv.innerHTML = '<div class="loading">Loading...</div>';
            
            try {
                const response = await fetch('/api/games');
                const games = await response.json();
                
                if (games.length === 0) {
                    gridDiv.innerHTML = `<div class="loading">${t.noGames}</div>`;
                    return;
                }
                
                gridDiv.innerHTML = games.map((game, index) => `
                    <div class="person-card" style="animation-delay: ${index * 0.1}s">
                        <div class="person-name">${game.title}</div>
                        <div class="person-author">${t.genre.replace(':', '')} ${game.genre}</div>
                        <div class="person-fact">${t.developer.replace(':', '')} ${game.developer}<br>${t.platform.replace(':', '')} ${game.platform}<br>${t.released}: ${game.releaseYear}</div>
                        <div class="person-date">${new Date(game.createdAt).toLocaleDateString()}</div>
                    </div>
                `).join('');
            } catch (error) {
                gridDiv.innerHTML = '<div class="loading">Error loading games.</div>';
            }
        }

        document.getElementById('personForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = e.target.querySelector('.submit-btn');
            submitBtn.textContent = 'Adding...';
            submitBtn.disabled = true;
            
            const person = {
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('gametitle').value,
                funFact: document.getElementById('funFact').value,
                platform: document.getElementById('platform').value
            };
            
            try {
                const response = await fetch('/api/items', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(person)
                });
                
                if (response.ok) {
                    showSuccessMessage('Review added successfully!');
                    document.getElementById('personForm').reset();
                    setTimeout(() => loadPeople(), 1000);
                } else {
                    const errorText = await response.text();
                    showSuccessMessage('Error: ' + errorText);
                }
            } catch (error) {
                showSuccessMessage('Error: ' + error.message);
            } finally {
                submitBtn.textContent = translations[currentLang].addReviewButton;
                submitBtn.disabled = false;
            }
        });
        
        function showSuccessMessage(message) {
            const messageDiv = document.getElementById('successMessage');
            messageDiv.innerHTML = `<div class="success-message">${message}</div>`;
            setTimeout(() => messageDiv.innerHTML = '', 4000);
        }
        
        async function loadPeople() {
            const gridDiv = document.getElementById('peopleGrid');
            const t = translations[currentLang];
            gridDiv.innerHTML = '<div class="loading">Loading...</div>';
            
            try {
                const response = await fetch('/api/items');
                const people = await response.json();
                
                if (people.length === 0) {
                    gridDiv.innerHTML = `<div class="loading">${t.noReviews}</div>`;
                    return;
                }
                
                gridDiv.innerHTML = people.map((person, index) => `
                    <div class="person-card" style="animation-delay: ${index * 0.1}s">
                        <div class="person-name">${person.lastName || 'Unknown Game'}</div>
                        <div class="person-author">by ${person.firstName || 'Anonymous'}</div>
                        <div class="person-platform">${t.playedOn}: ${person.platform || t.notSpecified}</div>
                        <div class="person-fact">${person.funFact || 'No review text'}</div>
                        <div class="person-date">${new Date(person.createdAt).toLocaleDateString('en-US', {
                            year: 'numeric',
                            month: 'long',
                            day: 'numeric',
                            hour: '2-digit',
                            minute: '2-digit'
                        })}</div>
                    </div>
                `).join('');
            } catch (error) {
                gridDiv.innerHTML = '<div class="loading">Error loading reviews.</div>';
            }
        }
        
        // Load on startup
        loadPeople();
        
        // Card hover effects
        document.addEventListener('mousemove', (e) => {
            const cards = document.querySelectorAll('.person-card');
            cards.forEach(card => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                if (x >= 0 && x <= rect.width && y >= 0 && y <= rect.height) {
                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;
                    const rotateX = (y - centerY) / 10;
                    const rotateY = (centerX - x) / 10;
                    card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(-5px)`;
                } else {
                    card.style.transform = '';
                }
            });
        });
    </script>
</body>
</html>
